services:
  db:
    image: mariadb:11
    container_name: fastapi_postgres 
    restart: always
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${POSTGRES_PASSWORD} 
      MARIADB_DATABASE: ${POSTGRES_DB}
      MARIADB_USER: ${POSTGRES_USER}
      MARIADB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/mysql  
    ports:
      - "${POSTGRES_PORT}:3306"
    networks:
      - api-network

  web:
    build: .
    container_name: fastapi_app
    restart: always
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "9000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - api-network

volumes:
  postgres_data:

networks:
  api-network:
    driver: bridge
  isolated-network:
    driver: bridge
